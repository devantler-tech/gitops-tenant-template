# SOPS encryption rules for this tenant's secrets.
#
# Replace the age public key below with your tenant's own key:
#     age-keygen -o key.txt        # the public key is printed as age1...
# then encrypt deploy/*.enc.yaml files with `sops --encrypt --in-place <file>`.
#
# The platform decrypts these at reconcile time with its cluster age keys, so the
# tenant's public key must also be added to the platform's decryption set when you
# register the tenant (see the platform's docs/TENANTS.md).
creation_rules:
  - path_regex: ^deploy/.+\.enc\.ya?ml$
    encrypted_regex: ^(data|stringData)$
    age: age1ql3z7hjy54pw3hyww5ayyfg7zqgvc7w3j2elw8zmrj2kg5sfn9aqmcac8p # REPLACE with your tenant's age public key
