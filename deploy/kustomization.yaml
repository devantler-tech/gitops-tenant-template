apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - poddisruptionbudget.yaml # drain-safe maxUnavailable:1 PDB so node drains never deadlock (platform#1882)
  - httproute.yaml
  - service.yaml
  - networkpolicy.yaml # re-opens Gateway ingress + DB/DNS egress under the platform's default-deny
  - cluster.yaml # CloudNativePG database — delete this line if your tenant has no DB
  # OpenBao-backed secrets via External Secrets — delete both if you need none:
  - secretstore.yaml
  - externalsecret.yaml
