# EXAMPLE tenant secret — do NOT commit it in plaintext.
#
# 1. Copy to `app-secret.enc.yaml` and fill in real values.
# 2. Encrypt in place with SOPS (see .sops.yaml):
#       sops --encrypt --in-place deploy/app-secret.enc.yaml
# 3. Add `- app-secret.enc.yaml` to deploy/kustomization.yaml.
# 4. Reference its keys from deploy/deployment.yaml via secretKeyRef.
#
# The platform decrypts `*.enc.yaml` with its cluster age keys at reconcile time.
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  labels:
    app.kubernetes.io/name: app
type: Opaque
stringData:
  EXAMPLE_KEY: replace-me
