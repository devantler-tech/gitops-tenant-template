# Materializes a native Kubernetes Secret in this namespace from OpenBao, via the
# namespaced SecretStore above. Store the real values in OpenBao under your
# tenant prefix (`secret/apps/<tenant>/*`, KV v2) out of band first. Reference the
# resulting Secret from deploy/deployment.yaml with a secretKeyRef.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app
  labels:
    app.kubernetes.io/name: app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: SecretStore # namespaced — never ClusterSecretStore (Kyverno-enforced)
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: EXAMPLE_KEY
      remoteRef:
        key: apps/REPLACE_ME/config # OpenBao KV path under your tenant prefix
        property: example_key
