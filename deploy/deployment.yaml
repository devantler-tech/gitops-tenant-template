apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app.kubernetes.io/name: app
    # The platform's `validate-replica-floor` Kyverno policy (Audit) flags any
    # Deployment/StatefulSet under 3 replicas — the HA floor that makes the
    # drain-safe `maxUnavailable: 1` PDB (poddisruptionbudget.yaml) actually
    # preserve availability through a node drain (see platform#1882). The scaffold
    # ships a single replica (a fresh tenant starts small), so it opts out
    # explicitly with this label to stay clean in the platform's PolicyReports
    # day-one. When you want HA, raise `replicas` to >= 3 and DELETE this label so
    # the floor protects you again.
    platform.devantler.tech/replica-floor: exempt
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app
    spec:
      # Pod-level PodSecurity "restricted" baseline. Set explicitly (not left
      # to a mutating webhook) so the tenant is admissible day-one on any
      # restricted cluster — including the platform, whose Kyverno
      # `require-seccomp-profile` rule demands the seccompProfile at the POD
      # level, not only on the container.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        # ⚠️ The container name MUST equal the repository name: cd.yaml →
        # publish-app pins the freshly built image digest into the container
        # with this name. Rename `app` to your repo name throughout this file.
        - name: app
          image: ghcr.io/devantler-tech/REPLACE_ME:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            # Example: database URL from the CloudNativePG-generated secret
            # (cluster.yaml creates `<cluster-name>-app`). Remove if no DB.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-db-app
                  key: uri
          # PodSecurity "restricted" compliant (the platform namespace enforces it).
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            # `readOnlyRootFilesystem: true` (above) makes the whole container
            # root filesystem read-only, so the app cannot write anywhere unless
            # you mount a writable volume. Almost every runtime still needs a
            # writable `/tmp` (framework caches, upload/render buffers, unix
            # sockets), so the scaffold ships one — otherwise a fresh tenant is
            # admitted day-one but CrashLoops the moment the app touches disk.
            # Add a mount per extra writable path your app needs (e.g. a cache
            # dir); remove this if your app writes nothing to the filesystem.
            - name: tmp
              mountPath: /tmp
      volumes:
        # Ephemeral scratch backing the writable `/tmp` mount above. `sizeLimit`
        # caps it so a runaway write is evicted rather than exhausting the node's
        # ephemeral storage; raise it if your workload buffers larger files.
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
