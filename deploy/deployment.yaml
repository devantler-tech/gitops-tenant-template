apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app.kubernetes.io/name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app
    spec:
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        # ⚠️ The container name MUST equal the repository name: cd.yaml →
        # publish-app pins the freshly built image digest into the container
        # with this name. Rename `app` to your repo name throughout this file.
        - name: app
          image: ghcr.io/devantler-tech/REPLACE_ME:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            # Example: database URL from the CloudNativePG-generated secret
            # (cluster.yaml creates `<cluster-name>-app`). Remove if no DB.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-db-app
                  key: uri
          # PodSecurity "restricted" compliant (the platform namespace enforces it).
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
