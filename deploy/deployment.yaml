apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app.kubernetes.io/name: app
    # The platform's `validate-replica-floor` Kyverno policy (Audit) flags any
    # Deployment/StatefulSet under 2 replicas — the platform HA floor that makes
    # the drain-safe `maxUnavailable: 1` PDB (poddisruptionbudget.yaml) actually
    # preserve availability through a node drain (see platform#1882; the paired
    # `validate-replica-ceiling` policy caps tenants at 3). The scaffold ships a
    # single replica (a fresh tenant starts small), so it opts out explicitly
    # with this label to stay clean in the platform's PolicyReports day-one.
    # When you want HA, raise `replicas` to 2-3 and DELETE this label so the
    # floor protects you again.
    platform.devantler.tech/replica-floor: exempt
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      # Allow the rollout to retire the old replica instead of being forced to
      # surge an extra pod onto a possibly-unschedulable or cold (cache-less)
      # node. With maxUnavailable: 0 a surge pod that cannot be scheduled or
      # cannot pull the (private) image wedges the whole rollout. Trade-off: a
      # brief unavailable window during deploys, acceptable for a fresh tenant.
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app
    spec:
      # Pod-level PodSecurity "restricted" baseline. Set explicitly (not left
      # to a mutating webhook) so the tenant is admissible day-one on any
      # restricted cluster — including the platform, whose Kyverno
      # `require-seccomp-profile` rule demands the seccompProfile at the POD
      # level, not only on the container.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        # fsGroup makes mounted volumes group-owned by 1000 so a non-root app can
        # read/write them; OnRootMismatch skips a full recursive chown when the top
        # dir already has the right group (cheap restart on large volumes). Set
        # explicitly to complete the self-describing posture above — the platform's
        # Kyverno `add-security-context` mutation would otherwise inject exactly
        # these (kubescape C-0211), so declaring them keeps the scaffold in lockstep
        # and mutation-independent.
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      # The app never talks to the Kubernetes API, so don't mount an API token
      # into the pod (the platform-provisioned tenant ServiceAccount is used by
      # External Secrets' Vault auth via secretstore.yaml, not by this pod).
      # Remove this only if your app genuinely calls the API.
      automountServiceAccountToken: false
      # Spread replicas across nodes so a scale-up to 2-3 replicas is actually
      # drain-safe: without this, both replicas can land on one node and defeat
      # the `maxUnavailable: 1` PDB. A single replica satisfies it trivially.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: app
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        # ⚠️ The container name MUST equal the repository name: cd.yaml →
        # publish-app pins the freshly built image digest into the container
        # with this name. Rename `app` to your repo name throughout this file.
        - name: app
          image: ghcr.io/devantler-tech/REPLACE_ME:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            # Example: database URL from the CloudNativePG-generated secret
            # (cluster.yaml creates `<cluster-name>-app`). Remove if no DB.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-db-app
                  key: uri
          # PodSecurity "restricted" compliant (the platform namespace enforces it).
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            # `readOnlyRootFilesystem: true` (above) makes the whole container
            # root filesystem read-only, so the app cannot write anywhere unless
            # you mount a writable volume. Almost every runtime still needs a
            # writable `/tmp` (framework caches, upload/render buffers, unix
            # sockets), so the scaffold ships one — otherwise a fresh tenant is
            # admitted day-one but CrashLoops the moment the app touches disk.
            # Add a mount per extra writable path your app needs (e.g. a cache
            # dir); remove this if your app writes nothing to the filesystem.
            - name: tmp
              mountPath: /tmp
      volumes:
        # Ephemeral scratch backing the writable `/tmp` mount above. `sizeLimit`
        # caps it so a runaway write is evicted rather than exhausting the node's
        # ephemeral storage; raise it if your workload buffers larger files.
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
