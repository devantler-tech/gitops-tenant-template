apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app
  labels:
    app.kubernetes.io/name: app
spec:
  # Attaches to the shared platform Gateway (Cilium, in kube-system).
  parentRefs:
    - name: platform
      namespace: kube-system
      sectionName: https
  hostnames:
    - app.platform.lan # local
    - app.platform.devantler.tech # production
  rules:
    - backendRefs:
        - name: app
          port: 80
