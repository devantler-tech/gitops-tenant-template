# CloudNativePG database for the tenant. Delete this file (and its entry in
# kustomization.yaml) if your tenant does not need a database. The operator
# generates an `<metadata.name>-app` Secret whose `uri` key is consumed by the
# Deployment's DATABASE_URL.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: app-db
  labels:
    app.kubernetes.io/name: app
spec:
  instances: 1
  # CNPG auto-creates a `minAvailable` PodDisruptionBudget for the cluster,
  # which at a single instance deadlocks node drains (the one pod can never be
  # evicted). Single-instance clusters are made drain-safe by disabling that
  # PDB — the platform's `validate-pdb-drain-safe` policy documents exactly
  # this remedy. When you scale to `instances: 2` or more for HA, REMOVE this
  # field so the operator's PDB protects the primary again.
  enablePDB: false
  storage:
    size: 1Gi
  bootstrap:
    initdb:
      database: app
      owner: app
  postgresql:
    parameters:
      max_connections: "50"
      shared_buffers: "64MB"
