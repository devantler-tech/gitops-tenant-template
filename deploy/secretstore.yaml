# Namespaced SecretStore for this tenant's OpenBao-backed secrets.
#
# Tenants MUST use a namespaced SecretStore (kind: SecretStore) — referencing the
# shared cluster-scoped `openbao` ClusterSecretStore is blocked by the platform's
# Kyverno policy `restrict-tenant-secret-stores`. It authenticates via this
# tenant's own Vault role (Kubernetes auth), which the platform scopes to
# `secret/data/apps/<tenant>/*` (see the platform's docs/TENANTS.md). Delete this
# file (and externalsecret.yaml) if your tenant needs no secrets.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: openbao
  labels:
    app.kubernetes.io/name: app
spec:
  provider:
    vault:
      # Target the -active Service (the unsealed Raft leader), NOT the plain
      # `openbao` Service: that one round-robins onto sealed-but-Ready standbys
      # which answer `503 Vault is sealed`, making secret syncs fail
      # intermittently. Same convention as the platform's ClusterSecretStore
      # and every live tenant.
      server: "http://openbao-active.openbao.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          # Tenant-scoped Vault role (defined in the platform's vault-config),
          # bound to the app-<tenant> read/write policy.
          # Use your repository name.
          role: "replace-me"
          serviceAccountRef:
            # This tenant's ServiceAccount (created in the platform registration);
            # its name equals the repository name.
            name: "replace-me"
