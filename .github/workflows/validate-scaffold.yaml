name: 🧱 Validate Scaffold

on:
  pull_request:
    branches: [main]

permissions: {}

# Template-repo-only scaffold-integrity gate. The deploy/ Kustomize manifests are
# this template's core deliverable — every new tenant inherits them — so a PR that
# breaks the kustomization (a renamed/removed resource, a YAML error) must not
# merge green and ship broken manifests downstream. Two layers run here:
#   1. schema-validate the deploy/ manifests (a typo'd CRD field that renders
#      without complaint must fail loudly), and
#   2. exercise scripts/rename-placeholders.sh — the onboarding script every new
#      tenant runs first; a botched sed address (a missed file, a corrupted label
#      KEY, a double-renamed CNPG `-app` suffix) would otherwise ship broken to
#      every tenant while the manifest validation above — which only ever sees the
#      UNrenamed scaffold — stays green.
# This job runs ONLY in the template repo; it no-ops in tenants created from it
# (the guard below is false there), mirroring how cd.yaml/release.yaml run only in
# tenants. Tenants replace deploy/ with their own app and validate it via their
# own ci.yaml.
jobs:
  validate-scaffold:
    name: Validate Scaffold
    if: github.repository == 'devantler-tech/gitops-tenant-template'
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
    env:
      KUBECONFORM_VERSION: v0.7.0
      KUBECONFORM_SHA256: c31518ddd122663b3f3aa874cfe8178cb0988de944f29c74a0b9260920d115d3
      # Pin the datreeio CRDs-catalog to a commit so validation is deterministic.
      # Bumping this ref is the refresh mechanism — a small, visible, reviewed
      # one-line change. We deliberately do NOT vendor the schemas in-repo: a
      # megabyte of copied JSON has no natural owner and drifts silently from
      # upstream, which is worse than the transient network dependency the cache
      # below already neutralises for the steady state.
      CRDS_CATALOG_REF: 1f22207301c45da9ee687f6bbf728da049e6c105
    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # read-only job; never pushes, so don't keep the token
      - name: ♻️ Cache CRD schemas
        # Persist the schemas kubeconform downloads from the catalog, keyed on the
        # pinned ref. A cache hit makes the validate step network-free (no fetch at
        # all), so a raw.githubusercontent.com blip can't flake the gate in steady
        # state; only a cold cache or a ref bump re-fetches.
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .kubeconform-cache
          key: kubeconform-crds-${{ env.CRDS_CATALOG_REF }}
      - name: 🧱 Build & schema-validate deploy/ manifests
        # kubectl (with embedded kustomize) is preinstalled on ubuntu-latest. Render
        # the manifests (a broken kustomization fails the render, not silently
        # downstream), then schema-validate every rendered resource with kubeconform —
        # the devantler-tech-standard manifest validator (KSail embeds it; the
        # platform's gitops-repo-audit skill uses it). Standard Kubernetes kinds
        # validate against kubeconform's built-in default schemas; the CRD-backed
        # resources (ExternalSecret, SecretStore, CloudNativePG Cluster, Gateway-API
        # HTTPRoute) validate against the datreeio CRDs-catalog, pinned + cached above.
        # NOTE: there is intentionally NO `-ignore-missing-schemas` — a CRD whose
        # schema doesn't resolve fails the gate loudly rather than being silently
        # skipped (which would pass green while validating nothing). The explicit
        # `Skipped: 0` assertion below enforces that invariant. Adding a CRD to deploy/
        # therefore requires the pinned catalog to carry its schema. This catches a
        # typo'd field that `kubectl kustomize` renders without complaint before it
        # ships to tenants.
        run: |
          set -euo pipefail
          mkdir -p .kubeconform-cache
          # Download + checksum-verify the kubeconform binary (supply-chain integrity).
          curl -fsSL --retry 3 --retry-all-errors -o kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          echo "${KUBECONFORM_SHA256}  kubeconform.tar.gz" | sha256sum -c -
          tar -xzf kubeconform.tar.gz kubeconform
          # Render first (broken kustomization fails here), then schema-validate.
          kubectl kustomize deploy/ > rendered.yaml
          # Short retry absorbs a transient catalog blip while (re)populating the cache;
          # a cache hit needs no network and succeeds on the first attempt. Fold stderr
          # into the capture (2>&1) so the Skipped:0 assertion below reads kubeconform's
          # summary regardless of which stream a future version prints it on.
          ok=
          for attempt in 1 2 3; do
            if ./kubeconform \
                -strict -summary -verbose \
                -cache .kubeconform-cache \
                -schema-location default \
                -schema-location "https://raw.githubusercontent.com/datreeio/CRDs-catalog/${CRDS_CATALOG_REF}/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json" \
                rendered.yaml 2>&1 | tee kubeconform.out; then
              ok=1
              break
            fi
            echo "kubeconform attempt ${attempt} failed; retrying in 5s..."
            sleep 5
          done
          [ -n "${ok}" ] || { echo "::error::kubeconform failed after 3 attempts"; exit 1; }
          # Guardrail: never pass green while validating nothing. Without
          # -ignore-missing-schemas an unresolved schema already errors above; this
          # asserts it explicitly so the invariant holds even if the flag is re-added.
          grep -Eq 'Skipped: 0$' kubeconform.out || {
            echo "::error::a resource was skipped — its CRD schema did not resolve; pin a catalog ref that carries it or fix the kind"
            exit 1
          }
      - name: 🧱 Validate onboarding (rename-placeholders.sh)
        # Run the onboarding script end-to-end against a throwaway copy and assert
        # the rename is correct (the build step above only ever sees the UNrenamed
        # scaffold, so this is the only thing that catches a botched rename before
        # it ships to every tenant). kubectl is preinstalled, so the test's
        # post-rename `kubectl kustomize` build assertion runs here too.
        run: sh scripts/rename-placeholders.test.sh

  # Platform admissibility gate (#71, epic #6 theme 4): the scaffold's promise is
  # "admissible on day one", so apply the platform's LIVE Kyverno admission policy
  # set (plus the shared kyverno-policies set) to the rendered scaffold and fail on
  # Enforce-mode violations. The policy checkouts are deliberately UNPINNED (main):
  # this gate exists to track the live admission truth — drift IS the signal — the
  # mirror of the schema job's pinned-catalog rationale, where determinism wins.
  # Scope notes: PodSecurity (namespace-label PSA) is not checkable offline and is
  # out of scope here; only `ClusterPolicy` resources are applied (a future CEL
  # ValidatingPolicy in either source needs adding explicitly); generate rules and
  # mutate-existing rules are filtered out — they act on cluster state, require a
  # live client, and never reject an applied manifest.
  admissibility:
    name: Platform Admissibility
    if: github.repository == 'devantler-tech/gitops-tenant-template'
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkouts
    env:
      KYVERNO_CLI_VERSION: v1.18.2
      KYVERNO_CLI_SHA256: cb2feb8356149fd2fe774c894ccf0969f4a60a83867dd913af724f74ffbbc18b
    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 📥 Checkout platform policies (live main — drift is the signal)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: devantler-tech/platform
          path: .platform
          sparse-checkout: k8s/bases/infrastructure/cluster-policies
          persist-credentials: false
      - name: 📥 Checkout shared kyverno-policies (live main)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: devantler-tech/kyverno-policies
          path: .shared-policies
          persist-credentials: false
      - name: 🛂 Apply admission policies to the rendered scaffold
        run: |
          set -euo pipefail
          # Download + checksum-verify the kyverno CLI (supply-chain integrity).
          curl -fsSL --retry 3 --retry-all-errors -o kyverno.tar.gz \
            "https://github.com/kyverno/kyverno/releases/download/${KYVERNO_CLI_VERSION}/kyverno-cli_${KYVERNO_CLI_VERSION}_linux_x86_64.tar.gz"
          echo "${KYVERNO_CLI_SHA256}  kyverno.tar.gz" | sha256sum -c -
          tar -xzf kyverno.tar.gz kyverno

          kubectl kustomize deploy/ > rendered.yaml

          # Keep only ClusterPolicies, and only their admission-relevant rules
          # (drop generate + mutate-existing rules; see the job comment). Plain
          # mutate rules are KEPT deliberately: the CLI applies them before
          # validating, mirroring the cluster's mutate-then-validate admission
          # order — validating the raw scaffold instead would false-fail rules
          # that an admission mutation satisfies.
          filter_admission_rules() {
            yq eval-all '
              select(.kind == "ClusterPolicy")
              | .spec.rules |= map(select(
                  (has("generate") or (has("mutate") and (.mutate | has("targets")))) | not
                ))
              | select((.spec.rules | length) > 0)
            ' "$1"
          }

          # check_set <name> <kustomize-dir> <require_pass>
          # require_pass=true adds the fail-open guard: at least one rule must
          # actually PASS a resource, proving the gate evaluated something (a
          # broken render/filter otherwise passes green while validating nothing).
          # The shared set legitimately matches nothing today (its policies
          # target HelmReleases), so the guard applies to the platform set only.
          check_set() {
            name=$1 dir=$2 require_pass=$3
            kubectl kustomize "$dir" > "${name}-policies.yaml"
            filter_admission_rules "${name}-policies.yaml" > "${name}-admission.yaml"
            if ! grep -q '^kind: ClusterPolicy' "${name}-admission.yaml"; then
              echo "::notice::${name}: no admission-relevant ClusterPolicies to apply"
              return 0
            fi
            # --audit-warn: Audit-mode policies warn (they don't block admission);
            # --warn-exit-code 0 activates exit-1-on-failure/error while keeping
            # warnings non-fatal — verified against kyverno CLI v1.18.2.
            ./kyverno apply "${name}-admission.yaml" --resource rendered.yaml \
              --audit-warn --warn-exit-code 0 2>&1 | tee "${name}-apply.out"
            if [ "${require_pass}" = "true" ]; then
              grep -Eq 'pass: [1-9]' "${name}-apply.out" || {
                echo "::error::${name}: no rule passed any resource — the gate evaluated nothing; fix the render/filter rather than trusting a vacuous green"
                return 1
              }
            fi
          }

          check_set platform .platform/k8s/bases/infrastructure/cluster-policies true
          check_set shared .shared-policies false
