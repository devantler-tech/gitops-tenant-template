name: 🧱 Validate Scaffold

on:
  pull_request:
    branches: [main]

permissions: {}

# Template-repo-only scaffold-integrity gate. The deploy/ Kustomize manifests are
# this template's core deliverable — every new tenant inherits them — so a PR that
# breaks the kustomization (a renamed/removed resource, a YAML error) must not
# merge green and ship broken manifests downstream. This job runs ONLY in the
# template repo; it no-ops in tenants created from it (the guard below is false
# there), mirroring how cd.yaml/release.yaml run only in tenants. Tenants replace
# deploy/ with their own app and validate it via their own ci.yaml.
jobs:
  validate-scaffold:
    name: Validate Scaffold
    if: github.repository == 'devantler-tech/gitops-tenant-template'
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false # read-only job; never pushes, so don't keep the token
      - name: 🧱 Build & schema-validate deploy/ manifests
        # kubectl (with embedded kustomize) is preinstalled on ubuntu-latest. Render
        # the manifests (a broken kustomization fails the render, not silently
        # downstream), then schema-validate every rendered resource with kubeconform —
        # the devantler-tech-standard manifest validator (KSail embeds it; the
        # platform's gitops-repo-audit skill uses it). Standard Kubernetes kinds
        # validate against kubeconform's built-in default schemas; the CRD-backed
        # resources (ExternalSecret, SecretStore, CloudNativePG Cluster, Gateway-API
        # HTTPRoute) validate against schemas bundled in-repo under
        # .github/crd-schemas/ (see its README for provenance + how to refresh).
        # Bundling drops the network dependency on the datreeio CRDs-catalog, so the
        # gate is deterministic and can't flake on a raw.githubusercontent.com blip.
        # NOTE: there is intentionally NO `-ignore-missing-schemas` — a CRD whose
        # schema isn't bundled fails the gate loudly rather than being silently
        # skipped (which would pass green while validating nothing). Adding a CRD to
        # deploy/ therefore requires bundling its schema. This catches a typo'd field
        # that `kubectl kustomize` renders without complaint before it ships to tenants.
        env:
          KUBECONFORM_VERSION: v0.7.0
          KUBECONFORM_SHA256: c31518ddd122663b3f3aa874cfe8178cb0988de944f29c74a0b9260920d115d3
        run: |
          set -euo pipefail
          # Download + checksum-verify the kubeconform binary (supply-chain integrity).
          curl -fsSL -o kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          echo "${KUBECONFORM_SHA256}  kubeconform.tar.gz" | sha256sum -c -
          tar -xzf kubeconform.tar.gz kubeconform
          # Render first (broken kustomization fails here), then schema-validate.
          kubectl kustomize deploy/ > rendered.yaml
          ./kubeconform \
            -strict -summary -verbose \
            -schema-location default \
            -schema-location ".github/crd-schemas/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json" \
            rendered.yaml
