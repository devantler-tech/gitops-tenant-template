name: 🧱 Validate Scaffold

on:
  pull_request:
    branches: [main]

permissions: {}

# Template-repo-only scaffold-integrity gate. The deploy/ Kustomize manifests are
# this template's core deliverable — every new tenant inherits them — so a PR that
# breaks the kustomization (a renamed/removed resource, a YAML error) must not
# merge green and ship broken manifests downstream. This job runs ONLY in the
# template repo; it no-ops in tenants created from it (the guard below is false
# there), mirroring how cd.yaml/release.yaml run only in tenants. Tenants replace
# deploy/ with their own app and validate it via their own ci.yaml.
jobs:
  validate-scaffold:
    name: Validate Scaffold
    if: github.repository == 'devantler-tech/gitops-tenant-template'
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false # read-only job; never pushes, so don't keep the token
      - name: 🧱 Build & schema-validate deploy/ manifests
        # kubectl (with embedded kustomize) is preinstalled on ubuntu-latest. Render
        # the manifests (catches a broken kustomization without a cluster), then
        # schema-validate every rendered resource with kubeconform — the
        # devantler-tech-standard manifest validator (KSail embeds it; the platform's
        # gitops-repo-audit skill uses it). Standard Kubernetes kinds validate against
        # the bundled schemas; the CRD-backed resources (ExternalSecret, SecretStore,
        # CloudNativePG Cluster, Gateway-API HTTPRoute) validate against the datreeio
        # CRDs-catalog. `-ignore-missing-schemas` skips any kind with no published
        # schema rather than failing. This catches a typo'd field that `kubectl
        # kustomize` renders without complaint before it ships to every tenant.
        env:
          KUBECONFORM_VERSION: v0.7.0
        run: |
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz kubeconform
          kubectl kustomize deploy/ | ./kubeconform \
            -strict -ignore-missing-schemas -summary -verbose \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
