name: 🎉 Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  release:
    # Skipped in the template repo itself; runs in every tenant created from it.
    if: github.repository != 'devantler-tech/gitops-tenant-template'
    uses: devantler-tech/reusable-workflows/.github/workflows/create-release.yaml@e67eb6e14b733748c43a4e0df1c572fdd0ae3773 # v5.5.6
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
