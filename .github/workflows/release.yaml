name: 🎉 Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  release:
    # Skipped in the template repo itself; runs in every tenant created from it.
    if: github.repository != 'devantler-tech/gitops-tenant-template'
    uses: devantler-tech/reusable-workflows/.github/workflows/create-release.yaml@d3a8a00a579bdbe53703fc1b3f48c0cc04446661 # v5.6.4
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
