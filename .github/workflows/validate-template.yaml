name: 🧱 Validate Template

on:
  pull_request:
    branches: [main]

permissions: {}

# Template-repo-only integrity gate for this template's two deliverables: the
# deploy/ Kustomize scaffold AND the framework-agnostic .github/workflows/ plumbing.
# Both are template-owned and propagate to every tenant via template-sync, so a PR
# that breaks the kustomization or ships an insecure/unpinned workflow must not
# merge green and reach downstream tenants. These jobs run ONLY in the template
# repo; they no-op in tenants created from it (the guards below are false there),
# mirroring how cd.yaml/release.yaml run only in tenants. Tenants own and validate
# their own deploy/ and ci.yaml.
jobs:
  validate-scaffold:
    name: Validate Scaffold
    if: github.repository == 'devantler-tech/gitops-tenant-template'
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false # read-only job; never pushes, so don't keep the token
      - name: 🧱 Build deploy/ manifests
        # kubectl (with embedded kustomize) is preinstalled on ubuntu-latest. This
        # mirrors the README's documented local check; it renders the manifests to
        # catch a broken kustomization without needing a cluster or CRDs.
        run: kubectl kustomize deploy/

  zizmor:
    name: Scan Workflows (zizmor)
    if: github.repository == 'devantler-tech/gitops-tenant-template'
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code scanning
      contents: read # checkout
      actions: read # read workflow definitions
    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false # read-only job; never pushes, so don't keep the token
      - name: 🔒 Run zizmor
        # Enforces the action-pinning policy declared in zizmor.yml against the
        # template-owned workflows, so an unpinned/insecure plumbing change cannot
        # ship downstream. Same scanner the rest of the portfolio runs.
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
